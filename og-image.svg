<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vg1" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vg2" cx="0%" cy="60%" r="52%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vg3" cx="100%" cy="60%" r="52%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="cs">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#1d4ed8" flood-opacity="0.09"/>
    </filter>
    <filter id="cs2">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#1d4ed8" flood-opacity="0.12"/>
    </filter>
    <pattern id="dg" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.2" fill="#2563eb" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#vg1)"/>
  <rect width="1200" height="630" fill="url(#vg2)"/>
  <rect width="1200" height="630" fill="url(#vg3)"/>
  <rect width="1200" height="630" fill="url(#dg)"/>

  <!-- ── LEFT CONTENT ── -->
  <!-- Badge -->
  <rect x="80" y="112" width="228" height="34" rx="17" fill="#2563eb" fill-opacity="0.08" stroke="#2563eb" stroke-opacity="0.22" stroke-width="1"/>
  <circle cx="101" cy="129" r="4" fill="#2563eb"/>
  <text x="116" y="134" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#2563eb" letter-spacing="1.8">AI FOR BUSINESS</text>

  <!-- Title -->
  <text x="80" y="242" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#0c1a3a" letter-spacing="-2">The Hemphill</text>
  <text x="80" y="324" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="url(#tg)" letter-spacing="-2">Group.</text>

  <!-- Separator -->
  <rect x="80" y="358" width="48" height="2.5" rx="1.25" fill="url(#tg)"/>

  <!-- Subtitle -->
  <text x="80" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="400" fill="#6b7280">We help businesses understand and implement</text>
  <text x="80" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="400" fill="#6b7280">the latest AI solutions, custom tailored for</text>
  <text x="80" y="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="400" fill="#6b7280">their use-case, so they can focus on what matters.</text>

  <!-- ── RIGHT: STAT CARDS ── -->
  <!-- Card 1 — Industries Served -->
  <rect x="716" y="96" width="404" height="126" rx="20" fill="white" filter="url(#cs)" stroke="#2563eb" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Icon bg -->
  <rect x="748" y="122" width="46" height="46" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-opacity="0.14" stroke-width="1"/>
  <!-- Grid icon -->
  <rect x="759" y="133" width="9" height="9" rx="2" fill="#2563eb" opacity="0.5"/>
  <rect x="771" y="133" width="9" height="9" rx="2" fill="#2563eb" opacity="0.75"/>
  <rect x="759" y="145" width="9" height="9" rx="2" fill="#2563eb" opacity="0.75"/>
  <rect x="771" y="145" width="9" height="9" rx="2" fill="#2563eb"/>
  <!-- Text -->
  <text x="812" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9ca3af" letter-spacing="0.5">INDUSTRIES SERVED</text>
  <text x="812" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="800" fill="#0c1a3a" letter-spacing="-1">10+</text>

  <!-- Card 2 — Efficiency Gain -->
  <rect x="716" y="248" width="404" height="126" rx="20" fill="white" filter="url(#cs)" stroke="#2563eb" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="748" y="274" width="46" height="46" rx="12" fill="#eff6ff" stroke="#0ea5e9" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Lightning icon -->
  <polygon points="776,278 762,297 772,297 769,320 783,296 772,296" fill="#0ea5e9"/>
  <text x="812" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9ca3af" letter-spacing="0.5">AVG. EFFICIENCY GAIN</text>
  <text x="812" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="800" fill="url(#tg)" letter-spacing="-1">3×</text>

  <!-- Card 3 — Custom Solutions -->
  <rect x="716" y="400" width="404" height="126" rx="20" fill="white" filter="url(#cs)" stroke="#2563eb" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="748" y="426" width="46" height="46" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-opacity="0.14" stroke-width="1"/>
  <!-- Checkmark icon -->
  <circle cx="771" cy="449" r="13" fill="none" stroke="#2563eb" stroke-width="2" stroke-opacity="0.3"/>
  <polyline points="763,449 769,455 780,443" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="812" y="432" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9ca3af" letter-spacing="0.5">CUSTOM SOLUTIONS</text>
  <text x="812" y="472" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="800" fill="#0c1a3a" letter-spacing="-1">100%</text>

  <!-- ── BOTTOM BAR ── -->
  <rect x="0" y="586" width="1200" height="44" fill="#eff6ff"/>
  <rect x="0" y="586" width="1200" height="1" fill="#2563eb" fill-opacity="0.12"/>
  <circle cx="96" cy="608" r="4" fill="#2563eb"/>
  <text x="110" y="613" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#6b7280">thehemphill.group</text>
  <text x="1120" y="613" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#9ca3af" text-anchor="end">First conversation is free.</text>
</svg>
